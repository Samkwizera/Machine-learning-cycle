events {}

http {
    # Docker's embedded DNS. Re-resolving per request lets nginx spread load
    # across all `api` replicas created by `docker compose --scale api=N`.
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 8000;

        location / {
            set $backend "http://api:8000";
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }
    }
}
